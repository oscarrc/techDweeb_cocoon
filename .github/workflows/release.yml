name: Release and Build
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick p7zip-full

      - name: Build Themes
        env:
          # Inject the version into the script if needed
          THEME_VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          chmod +x ./convert_techdweeb.sh
          COLORS=("orange" "purple" "cyan" "green" "pink" "blue" "red" "grey" "dmg" "black")
          for color in "${COLORS[@]}"; do
            ./convert_techdweeb.sh "$color"
          done

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: out/*.zip
